name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Run the full suite (compiles, then tests) so a release is never built
      # from a red tree.
      - run: npm test

      - run: npx @vscode/vsce package --no-dependencies "${GITHUB_REF_NAME#v}"

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
